name: Build CalListener.exe

on:
  push:
    branches: [main]
    tags:    ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed by the release step on tag pushes

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[windows,dev]

      - name: Build .exe
        run: python installer/build_exe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalListener-${{ github.sha }}
          path: dist/CalListener.exe
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CalListener.exe
